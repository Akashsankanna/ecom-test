version: '3.8'

services:
  db:
    image: postgres:15
    container_name: team_db
    environment:
      POSTGRES_DB: ecom8
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-akash45}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: team_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8082:8080"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/auth/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: team_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      KEYCLOAK_SERVER_URL: http://keycloak:8080
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app

  adminpanel:
    build:
      context: ./adminpanel
    container_name: team_adminpanel
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
