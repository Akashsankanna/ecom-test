services:
  db:
    image: postgres:15
    container_name: team_db
    environment:
      POSTGRES_DB: ecom8
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: akash45
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: team_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    container_name: team_backend
    env_file:
      - ./Backend/.env
    environment:
      DB_HOST: db
      KEYCLOAK_SERVER_URL: http://keycloak:8080
    ports:
      - "8000:8000"
    depends_on:
      - db
      - keycloak
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/Team-Aryavarse
    container_name: team_frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: